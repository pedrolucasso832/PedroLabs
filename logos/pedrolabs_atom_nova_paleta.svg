<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">PedroLabs logo atômico na nova paleta</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo PedroLabs com átomo estilizado dentro de hexágono usando paleta da foto</desc>

  <defs>
    <filter id="sh-hex" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#060e12" flood-opacity="0.85"/>
    </filter>
    <filter id="glow-hex" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#3D7B8C" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-orbit" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7BB5A0" flood-opacity="0.6"/>
    </filter>
    <filter id="sh-brand" x="-5%" y="-20%" width="110%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#060e12" flood-opacity="0.8"/>
    </filter>
  </defs>

  

