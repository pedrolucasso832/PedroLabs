  <text x="340" y="406" text-anchor="middle" filter="url(#sh-brand)" style="fill:rgb(232, 224, 208);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:26px;font-weight:700;text-anchor:middle;dominant-baseline:auto">PEDROLABS</text>
